<!DOCTYPE html>
<html>
<head>
    <title>Non-Invasive Anemia Detection</title>
</head>
<body>
    <h1>🩸 Non-Invasive Anemia Detector</h1>
    <form method="POST" enctype="multipart/form-data">
        <label>Palm Image:</label>
        <input type="file" name="palm" required><br><br>

        <label>Nail Image:</label>
        <input type="file" name="nail" required><br><br>

        <label>Age:</label>
        <input type="number" name="age" min="1" max="120" value="25" required><br><br>

        <label>Gender:</label>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select><br><br>

        <input type="submit" value="Predict">
    </form>

    {% if result %}
        <h2>Results:</h2>
        <p><b>Predicted Hb Level:</b> {{ hb_val | round(1) }} g/dL</p>
        <p><b>Status:</b> {{ result }}</p>
    {% endif %}
</body>
</html>
